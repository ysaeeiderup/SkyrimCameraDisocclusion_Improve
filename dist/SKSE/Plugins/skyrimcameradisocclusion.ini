; ─────────────────────────────────────────────────────────────────────────
; Skyrim Camera Disocclusion — settings
;
; Edit values below to taste. Restart Skyrim for changes to apply.
; If a value is missing, malformed, or out of bounds, the plugin falls
; back to the listed default — you can't break the mod by editing this.
;
; Lines starting with ';' are comments.
; ─────────────────────────────────────────────────────────────────────────

[Camera]
; Vertical offset added to the player's position before computing the
; ray fan target (game units). Higher = aim toward head/torso, lower
; = aim toward feet. Default ~150 ≈ chest height for a standard human race.
; Useful range: ~0 to ~250. Bound: [0, 500].
PlayerHeightOffset = 150.0


[RayFan]
; Half-width / half-height of the elliptical ray fan around the camera→player
; segment (game units). The fan biases horizontally because walls and
; columns are the most common occluders that need clipping; floor/ceiling
; rarely cause see-through problems.
;
; Wider radii = more occluders caught (better see-through coverage),
; narrower = fewer false-positive clips on fan edges.
;
; Bound: [0, 200] for both.
FanRadiusH = 20.0
FanRadiusV = 6.0


[Strip]
; How long the outdoor occluder strip stays active after the most recent
; ray hit (seconds). Brief — when you stop looking through walls, the
; occluders snap back to normal almost immediately.
; Bound: [0, 5].
StripLingerSeconds = 0.3

; How long a hit object persists in the clip-distance set (seconds).
; Longer than StripLingerSeconds so the visual clip plane doesn't twitch
; across single-frame ray misses.
; Bound: [0, 30].
HitLingerSeconds = 2.0
